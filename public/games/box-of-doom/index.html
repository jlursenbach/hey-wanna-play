<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Box of Doom — Hey Wanna Play?</title>
  <link rel="stylesheet" href="src/styles.css"/>
</head>
<body>
  <div id="screen-setup" class="screen">
    <h1 class="game-title">BOX OF DOOM</h1>
    <p class="game-subtitle">A GAME OF TRUST &amp; DECEPTION</p>

    <div class="surface how">
      <div class="section-title">HOW TO PLAY</div>
      <div>📱 <strong>P1</strong> peeks inside the box</div>
      <div>🎭 <strong>P1</strong> convinces <strong>P2</strong></div>
      <div>🤔 <strong>P2</strong> decides: take it or leave it</div>
      <div class="hint-line"><span class="good">■ Green</span> = good · <span class="bad">■ Red</span> = bad</div>
      <div class="hint-line">P2 wins by calling it correctly. P1 wins by fooling P2.</div>
    </div>

    <button class="btn-primary" id="btn-start">▶ START ROUND</button>
    <div class="scores" id="setup-scores"></div>

    <button class="btn-back" id="btn-back-home">← Hey Wanna Play?</button>
  </div>

  <div id="screen-game" class="screen hidden">
    <div class="label" id="round-label"></div>
    <div id="message" class="message">—</div>

    <div id="peek-panel" class="panel hidden">
      <div class="big-box">📦</div>
      <div class="instruct">Only <span id="peek-player"></span> can look.</div>
      <button id="btn-peek" class="btn-action">👁 PEEK</button>

      <div id="peek-result" class="hidden">
        <div id="item-emoji" class="item-emoji"></div>
        <div id="item-name" class="item-name"></div>
        <div id="item-verdict" class="item-verdict"></div>
        <button id="btn-ready" class="btn-subtle">Ready for guess →</button>
      </div>
    </div>

    <div id="guess-panel" class="panel hidden">
      <div class="big-box">📦</div>
      <div class="question">DO YOU WANT THE BOX?</div>
      <button id="btn-take" class="btn-take">📦 TAKE THE BOX</button>
      <button id="btn-leave" class="btn-leave">🚶 LEAVE IT</button>
    </div>

    <div id="result-panel" class="panel hidden">
      <div id="result-emoji" class="item-emoji"></div>
      <div id="result-name" class="item-name"></div>
      <div id="result-verdict" class="item-verdict"></div>
      <div id="result-call" class="result-call"></div>
      <div id="result-outcome" class="result-outcome"></div>
      <div id="result-who" class="result-who"></div>
      <button id="btn-next" class="btn-primary">▶ NEXT ROUND</button>
    </div>

    <div class="scores" id="game-scores"></div>
    <button class="btn-back" id="btn-menu">← menu</button>
  </div>

  <script src="src/game.js"></script>
  <script src="src/ai.js"></script>
  <script src="src/ui.js"></script>
</body>
</html>
